name: Test and render notebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Discover which notebooks changed (or all on main push) ──────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      notebooks: ${{ steps.list.outputs.notebooks }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          # Find all notebook directories (any folder containing index.ipynb)
          dirs=$(find . -name "index.ipynb" -not -path "./.git/*" \
                 | sed 's|/index.ipynb||' | sed 's|^\./||' | sort | jq -R . | jq -sc .)
          echo "notebooks=$dirs" >> "$GITHUB_OUTPUT"
          echo "Found: $dirs"

  # ── Execute each notebook in its own conda env ──────────────────────────
  execute:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        notebook: ${{ fromJson(needs.discover.outputs.notebooks) }}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ${{ matrix.notebook }}/environment.yml
          activate-environment: true
          auto-activate-base: false

      - name: Install test dependencies
        shell: bash -l {0}
        run: pip install nbmake

      - name: Test — notebook runs without errors
        shell: bash -l {0}
        run: pytest --nbmake ${{ matrix.notebook }}/index.ipynb -v

      - name: Render — execute and save outputs
        shell: bash -l {0}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            ${{ matrix.notebook }}/index.ipynb

      - name: Upload executed notebook as artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: notebook-${{ matrix.notebook }}
          path: ${{ matrix.notebook }}/index.ipynb
          retention-days: 1

  # ── Collect all executed notebooks and push in one commit ────────────────
  push-outputs:
    needs: execute
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all executed notebooks
        uses: actions/download-artifact@v4
        with:
          pattern: notebook-*
          merge-multiple: true

      - name: Commit and push refreshed outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || \
            git commit -m "chore: refresh notebook outputs [skip ci]"
          git push
